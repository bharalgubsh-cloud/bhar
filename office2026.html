<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رادار مركز بحر الغبش - المراقبة الذكية</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #e0e0e0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .log-card { border-right: 4px solid #10b981; animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .stat-badge { background: rgba(16, 185, 129, 0.1); border: 1px solid rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-zinc-800 pb-6">
            <div>
                <h1 class="text-3xl font-black text-emerald-500 tracking-tight">رادار الإدارة 🛰️</h1>
                <p class="text-zinc-500 mt-1">مركز بحر الغبش | مراقبة مباشرة وشاملة</p>
            </div>
            <div class="flex gap-4 items-center">
                <div id="status-light" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                <div class="bg-emerald-950/20 p-3 rounded-xl border border-emerald-500/30 text-center">
                    <span class="text-[10px] block text-emerald-500 uppercase font-bold">معرف الرادار النشط</span>
                    <code id="my-id" class="text-lg font-mono font-bold text-white uppercase">جاري الربط...</code>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <span class="text-zinc-500 text-sm">متواجدون الآن</span>
                <div id="active-count" class="text-2xl font-bold text-emerald-400">0</div>
            </div>
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <span class="text-zinc-500 text-sm">إجمالي الزيارات</span>
                <div id="total-hits" class="text-2xl font-bold text-blue-400">0</div>
            </div>
            <div class="bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                <span class="text-zinc-500 text-sm">آخر نشاط</span>
                <div id="last-activity" class="text-2xl font-bold text-zinc-300">--:--</div>
            </div>
        </div>

        <div id="logs" class="space-y-4">
            <div id="empty-state" class="text-center py-20 text-zinc-600 border-2 border-dashed border-zinc-800 rounded-3xl">
                بانتظار وصول بيانات من زوار الموقع...
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer('BAHR-RADAR-2026');
        let sessionStats = { hits: 0 };

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status-light').classList.replace('bg-red-500', 'bg-emerald-500');
            console.log('الرادار جاهز');
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                processLog(data);
                playAlert(data.type);
            });
        });

        function processLog(data) {
            const logs = document.getElementById('logs');
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.remove();

            sessionStats.hits++;
            document.getElementById('total-hits').innerText = sessionStats.hits;
            document.getElementById('last-activity').innerText = new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute:'2-digit'});

            const time = new Date().toLocaleTimeString('ar-EG');
            let cardHTML = '';

            // بناء محتوى الكرت بناءً على نوع الحدث
            switch(data.type) {
                case 'LOGIN':
                    cardHTML = createCard("🔔 دخول جديد", `العضو <b>${data.user}</b> دخل الموقع الآن.`, `مرات الدخول: ${data.visits || 1}`, "bg-zinc-900", time);
                    break;
                case 'PAGE_VIEW':
                    cardHTML = createCard("👀 تصفح", `العضو <b>${data.user}</b> يتصفح الآن: <span class="text-blue-400">${data.page}</span>`, "", "bg-zinc-900/40", time);
                    break;
                case 'ORDER':
                    cardHTML = createCard("🛒 طلب جديد", `<b>${data.user}</b> قام بطلب: <span class="text-yellow-500 font-bold">${data.item}</span>`, "يحتاج معالجة", "bg-emerald-900/20 ring-1 ring-emerald-500/50", time);
                    break;
                case 'LOGOUT':
                    cardHTML = createCard("⏱️ مغادرة", `خرج <b>${data.user}</b>. قضى في الموقع: <span class="text-orange-400">${data.duration}</span>`, "", "bg-zinc-900 border-zinc-700", time);
                    break;
            }

            logs.insertAdjacentHTML('afterbegin', cardHTML);
        }

        function createCard(title, body, footer, bgColor, time) {
            return `
                <div class="log-card ${bgColor} p-5 rounded-2xl shadow-xl flex flex-col md:flex-row justify-between gap-4">
                    <div class="flex-1">
                        <div class="flex items-center gap-2 mb-1">
                            <span class="text-xs font-bold uppercase tracking-wider text-emerald-500">${title}</span>
                            ${footer ? `<span class="stat-badge text-[10px] px-2 py-0.5 rounded-full text-zinc-400">${footer}</span>` : ''}
                        </div>
                        <div class="text-lg text-zinc-200">${body}</div>
                    </div>
                    <div class="text-right flex flex-col justify-center">
                        <span class="text-xs text-zinc-500 font-mono">${time}</span>
                    </div>
                </div>
            `;
        }

        function playAlert(type) {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const osc = context.createOscillator();
            const gain = context.createGain();

            osc.connect(gain);
            gain.connect(context.destination);

            // نغمة مميزة للطلبات ونغمة عادية للدخول
            if (type === 'ORDER') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, context.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, context.currentTime + 0.5);
            } else {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(523.25, context.currentTime);
            }

            gain.gain.setValueAtTime(0.1, context.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.5);

            osc.start();
            osc.stop(context.currentTime + 0.5);
        }
    </script>
</body>
</html>
