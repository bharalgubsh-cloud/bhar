<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رادار مركز بحر الغبش - المراقبة الذكية</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* التعديل الجديد: ألوان فاتحة واحترافية (Modern Light Theme) */
        body { background: #f8fafc; color: #1e293b; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* تصميم بطاقات السجل */
        .log-card { 
            border-right: 4px solid #3b82f6; 
            animation: slideIn 0.3s ease-out; 
            background: #ffffff; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }
        
        .visitor-row:hover { background: rgba(59, 130, 246, 0.05); }
        
        /* تخصيص السكرول بار */
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 border-b border-slate-200 pb-6">
            <div>
                <h1 class="text-3xl font-black text-blue-600 tracking-tight">رادار الإدارة 🛰️</h1>
                <p class="text-slate-500 mt-1 font-medium">مركز بحر الغبش | نظام الرصد المباشر</p>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="clearLogs()" class="bg-white hover:bg-red-50 text-red-500 px-4 py-2 rounded-xl border border-red-100 text-sm font-bold transition-all shadow-sm">
                    تصفير السجل 🗑️
                </button>
                <div id="status-light" class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                <div class="bg-blue-50 p-3 rounded-xl border border-blue-100">
                    <code id="my-id" class="text-lg font-mono font-bold text-blue-700 uppercase">جاري الربط...</code>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <span class="text-slate-500 text-sm font-bold uppercase">متواجدون الآن</span>
                <div id="active-count" class="text-4xl font-black text-blue-600 mt-1">0</div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <span class="text-slate-500 text-sm font-bold uppercase">إجمالي الحركات</span>
                <div id="total-hits" class="text-4xl font-black text-indigo-600 mt-1">0</div>
            </div>
            <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                <span class="text-slate-500 text-sm font-bold uppercase">آخر نشاط</span>
                <div id="last-activity" class="text-4xl font-black text-slate-700 mt-1">--:--</div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <span class="w-2 h-6 bg-blue-500 rounded-full"></span>
                    سجل النشاط المباشر
                </h2>
                <div id="logs" class="space-y-4 max-h-[600px] overflow-y-auto pr-2 custom-scroll">
                    </div>
            </div>

            <div>
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-slate-800">
                    <span class="w-2 h-6 bg-indigo-500 rounded-full"></span>
                    حالة الزوار الحالية
                </h2>
                <div id="active-visitors-list" class="bg-white border border-slate-100 shadow-sm rounded-2xl p-5 space-y-4">
                    <p class="text-slate-400 text-sm text-center italic">لا يوجد زوار نشطين حالياً</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer('BAHR-RADAR-2026');
        let activeConnections = new Map();
        let totalCount = parseInt(localStorage.getItem('bahr_total_count')) || 0;

        window.onload = () => {
            const savedLogs = localStorage.getItem('bahr_logs_html');
            if (savedLogs) {
                document.getElementById('logs').innerHTML = savedLogs;
                document.getElementById('total-hits').innerText = totalCount;
            } else {
                showEmptyState();
            }
        };

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            document.getElementById('status-light').classList.replace('bg-red-500', 'bg-green-500');
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                activeConnections.set(conn.peer, { name: data.user, location: data.page || "الرئيسية" });
                updateActiveDisplay();
                processLog(data);
                playAlert(data.type);
            });
            conn.on('close', () => {
                activeConnections.delete(conn.peer);
                updateActiveDisplay();
            });
        });

        function processLog(data) {
            const logs = document.getElementById('logs');
            const emptyState = document.getElementById('empty-state');
            if (emptyState) emptyState.remove();

            totalCount++;
            document.getElementById('total-hits').innerText = totalCount;
            localStorage.setItem('bahr_total_count', totalCount);

            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-EG', {hour:'2-digit', minute:'2-digit'});
            document.getElementById('last-activity').innerText = timeStr;

            let cardHTML = '';
            switch(data.type) {
                case 'LOGIN':
                    cardHTML = createCard("🔔 دخول جديد", `الزائر <b>${data.user}</b> دخل الموقع الآن`, "متصل", "border-blue-500", "text-blue-600", timeStr);
                    break;
                case 'PAGE_VIEW':
                    cardHTML = createCard("👀 تصفح", `يتصفح <b>${data.user}</b> الآن صفحة: <span class="text-indigo-600 font-bold">${data.page}</span>`, "نشط", "border-slate-300", "text-slate-500", timeStr);
                    break;
                case 'ORDER':
                    cardHTML = createCard("🛒 طلب شراء", `<b>${data.user}</b> قام بطلب: <span class="text-orange-600 font-bold">${data.item}</span>`, "عاجل", "border-orange-500", "text-orange-600", timeStr);
                    break;
            }

            logs.insertAdjacentHTML('afterbegin', cardHTML);
            localStorage.setItem('bahr_logs_html', logs.innerHTML);
        }

        function createCard(title, body, status, borderColor, titleColor, time) {
            return `
                <div class="log-card p-5 rounded-2xl border border-slate-100 flex justify-between items-center transition-all hover:shadow-md" style="border-right-color: inherit;">
                    <div>
                        <div class="flex items-center gap-3 mb-2">
                            <span class="text-xs font-black uppercase ${titleColor} tracking-widest">${title}</span>
                            <span class="text-[10px] px-2 py-0.5 rounded-lg bg-slate-100 text-slate-500 font-bold">${status}</span>
                        </div>
                        <div class="text-md text-slate-700">${body}</div>
                    </div>
                    <div class="text-xs text-slate-400 font-bold bg-slate-50 p-2 rounded-lg">${time}</div>
                </div>
            `;
        }

        function updateActiveDisplay() {
            const list = document.getElementById('active-visitors-list');
            const countDisplay = document.getElementById('active-count');
            countDisplay.innerText = activeConnections.size;

            if (activeConnections.size === 0) {
                list.innerHTML = '<p class="text-slate-400 text-sm text-center italic">لا يوجد زوار نشطين حالياً</p>';
                return;
            }

            let html = '';
            activeConnections.forEach((val) => {
                html += `
                    <div class="visitor-row flex justify-between items-center p-3 rounded-xl border border-slate-50 transition-all">
                        <span class="text-sm font-bold text-slate-700">${val.name}</span>
                        <span class="text-[10px] bg-blue-600 text-white px-3 py-1 rounded-full font-bold shadow-sm">${val.location}</span>
                    </div>
                `;
            });
            list.innerHTML = html;
        }

        function clearLogs() {
            if(confirm('هل تريد مسح السجل المحفوظ نهائياً؟')) {
                localStorage.removeItem('bahr_logs_html');
                localStorage.removeItem('bahr_total_count');
                totalCount = 0;
                document.getElementById('total-hits').innerText = "0";
                showEmptyState();
            }
        }

        function showEmptyState() {
            document.getElementById('logs').innerHTML = `
                <div id="empty-state" class="text-center py-20 text-slate-400 border-2 border-dashed border-slate-200 rounded-3xl bg-white">
                    <p class="text-lg font-medium">لا توجد بيانات مسجلة في السجل</p>
                    <p class="text-sm">سيتم ظهور النشاط هنا بمجرد دخول الزوار</p>
                </div>`;
        }

        function playAlert(type) {
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                const osc = context.createOscillator();
                const gain = context.createGain();
                osc.connect(gain);
                gain.connect(context.destination);
                osc.frequency.setValueAtTime(type === 'ORDER' ? 880 : 540, context.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.4);
                osc.start();
                osc.stop(context.currentTime + 0.4);
            } catch(e) {}
        }
    </script>
</body>
</html>
