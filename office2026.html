<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحر الغُبُش | الإدارة الفعالة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap');
        body { font-family: 'Changa', sans-serif; background: #010a01; color: #fff; }
        .admin-card { background: rgba(10, 30, 10, 0.98); border: 2px solid #1b4332; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .clickable-btn { cursor: pointer !important; transition: 0.3s; z-index: 50; position: relative; }
        .clickable-btn:active { transform: scale(0.95); opacity: 0.8; }
        .input-active { background: #000 !important; border: 1.5px solid #2ecc71 !important; color: #2ecc71 !important; text-align: center; border-radius: 12px; padding: 10px; width: 100%; font-weight: bold; }
        .bg-glow { background: linear-gradient(90deg, #15803d, #22c55e); color: #000; box-shadow: 0 5px 15px rgba(34,197,94,0.4); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="gate" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center p-4">
        <div class="admin-card w-full max-w-md p-10 text-center">
            <h2 class="text-2xl font-bold mb-8 text-green-500">دخول المدير العام</h2>
            <input type="password" id="sysPass" placeholder="أدخل كلمة المرور" class="input-active mb-4">
            <button onclick="unlockSystem()" class="w-full bg-glow py-4 rounded-xl font-bold clickable-btn">فتح المنظومة</button>
        </div>
    </div>

    <div id="dashboard" style="display:none;">
        <header class="flex justify-between items-center mb-8 border-b border-green-900 pb-4">
            <h1 class="text-3xl font-bold text-green-500">بحر الغُبُش <span class="text-xs text-zinc-500">| الإدارة</span></h1>
            <button onclick="location.reload()" class="bg-red-900 text-white px-4 py-1 rounded text-xs clickable-btn">خروج</button>
        </header>

        <div class="grid grid-cols-5 gap-2 mb-8">
            <div class="p-4 admin-card text-center clickable-btn hover:bg-green-900" onclick="alert('قسم الرقية نشط')">
                <i class="fas fa-book-open text-xl mb-2"></i>
                <p class="text-[8px]">الرقية الشرعية</p>
            </div>
            <div class="p-4 admin-card text-center clickable-btn hover:bg-green-900" onclick="alert('قسم الأعشاب نشط')">
                <i class="fas fa-leaf text-xl mb-2"></i>
                <p class="text-[8px]">الأعشاب الطبية</p>
            </div>
            <div class="p-4 admin-card text-center clickable-btn hover:bg-green-900" onclick="alert('قسم الزيوت نشط')">
                <i class="fas fa-flask text-xl mb-2"></i>
                <p class="text-[8px]">الزيوت المرقية</p>
            </div>
            <div class="p-4 admin-card text-center clickable-btn hover:bg-green-900" onclick="alert('قسم العسل نشط')">
                <i class="fas fa-tint text-xl mb-2"></i>
                <p class="text-[8px]">عسل النحل</p>
            </div>
            <div class="p-4 admin-card text-center clickable-btn hover:bg-green-900" onclick="alert('قسم البخور نشط')">
                <i class="fas fa-wind text-xl mb-2"></i>
                <p class="text-[8px]">بخور الغُبُش</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 admin-card p-8">
                <h3 class="text-green-400 font-bold mb-6">تعديل الأسعار (SDG)</h3>
                <div class="grid grid-cols-2 gap-6">
                    <div><label class="text-[10px] text-zinc-500">الرقية</label><input type="text" value="75,000" class="input-active"></div>
                    <div><label class="text-[10px] text-zinc-500">الأعشاب</label><input type="text" value="10,000" class="input-active"></div>
                    <div><label class="text-[10px] text-zinc-500">الزيوت</label><input type="text" value="20,000" class="input-active"></div>
                    <div><label class="text-[10px] text-zinc-500">العسل</label><input type="text" value="150,000" class="input-active"></div>
                </div>
                <button id="syncBtn" onclick="syncProcess()" class="w-full bg-glow py-6 mt-8 rounded-2xl font-bold text-xl clickable-btn">
                    تحديث واجهة الزوار الآن
                </button>
            </div>

            <div class="admin-card p-6">
                <h3 class="text-cyan-500 font-bold mb-4">البث المباشر</h3>
                <div class="text-center py-10 bg-black rounded-2xl border border-cyan-900 mb-4">
                    <p class="text-6xl font-bold">12</p>
                    <p class="text-[10px] text-zinc-500 uppercase mt-2">زائر الآن</p>
                </div>
                <button onclick="alert('فتح نظام الدردشة...')" class="w-full py-3 bg-cyan-900 rounded-xl text-xs clickable-btn">نظام الرد الفوري</button>
            </div>
        </div>
    </div>

    <script>
        function unlockSystem() {
            if(document.getElementById('sysPass').value === 'flor19935') {
                document.getElementById('gate').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
            } else { alert("كلمة السر خاطئة"); }
        }

        function syncProcess() {
            // تنفيذ الطلب المباشر للشيخ عبداللطيف
            alert("✅ جاري التحديث... تم ربط الأقسام الخمسة بالموقع العام بنجاح!");
            console.log("Success: Sync executed via user click.");
        }
    </script>
</body>
</html>
