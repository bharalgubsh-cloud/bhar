<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>رادار مركز بحر الغبش - البث المباشر</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0a; color: #e0e0e0; font-family: system-ui; }
        .log-card { border-right: 4px solid #10b981; transition: 0.3s; }
        .visitor-node { background: rgba(16, 185, 129, 0.1); border: 1px solid #065f46; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4 border-b border-zinc-800 pb-6">
            <div>
                <h1 class="text-3xl font-black text-emerald-500">رادار الإدارة 🛰️</h1>
                <p class="text-zinc-500 mt-1">مراقبة حية لمركز بحر الغبش</p>
            </div>
            <div class="bg-emerald-950/30 p-3 rounded-xl border border-emerald-500/30">
                <span class="text-xs block text-emerald-500 mb-1">معرف الرادار الخاص بك:</span>
                <code id="my-id" class="text-lg font-mono font-bold text-white text-center block">جاري الاتصال...</code>
            </div>
        </header>

        <div id="logs" class="space-y-4">
            <div class="text-center py-20 text-zinc-600 border-2 border-dashed border-zinc-800 rounded-3xl">
                بانتظار دخول أول زائر للمنظومة...
            </div>
        </div>
    </div>

    <script>
        // سنستخدم معرف ثابت للرادار ليسهل الربط
        const peer = new Peer('BAHR-RADAR-2026'); 

        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
            console.log('الرادار جاهز لاستقبال الإشارات');
        });

        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                const logs = document.getElementById('logs');
                if (logs.innerText.includes('بانتظار')) logs.innerHTML = '';

                const time = new Date().toLocaleTimeString('ar-EG');
                let content = "";
                let cardClass = "bg-zinc-900";

                if (data.type === 'LOGIN') {
                    content = `🔔 <b>دخول جديد:</b> الزائر <span class="text-emerald-400">${data.user}</span> متواجد الآن في الموقع.`;
                } else if (data.type === 'ORDER') {
                    content = `🛒 <b>طلب منتج:</b> <span class="text-emerald-400">${data.user}</span> اختار منتج <span class="text-yellow-500">[${data.item}]</span>`;
                    cardClass = "bg-emerald-900/20 ring-1 ring-emerald-500/50";
                    playAlert();
                }

                const html = `
                    <div class="log-card ${cardClass} p-5 rounded-2xl flex justify-between items-center shadow-xl">
                        <span class="text-lg">${content}</span>
                        <span class="text-xs text-zinc-500 font-mono">${time}</span>
                    </div>
                `;
                logs.insertAdjacentHTML('afterbegin', html);
            });
        });

        function playAlert() {
            const audio = new AudioContext();
            const osc = audio.createOscillator();
            osc.connect(audio.destination);
            osc.start(); osc.stop(audio.currentTime + 0.1);
        }
    </script>
</body>
</html>
