<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحر الغُبُش | النظام الإداري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap');
        body { font-family: 'Changa', sans-serif; background: #051005; color: #e5e5e5; }
        .glass-panel { background: rgba(10, 30, 10, 0.95); border: 1px solid #145a32; border-radius: 20px; }
        .stat-card { background: #0a1f0a; border-right: 4px solid #2ecc71; padding: 15px; border-radius: 10px; }
        input { background: #000 !important; border: 1px solid #145a32 !important; color: #2ecc71 !important; text-align: center; border-radius: 8px; width: 100%; padding: 8px; }
        .btn-sync { background: #22c55e; color: #000; font-weight: bold; transition: 0.3s; }
        .btn-sync:hover { background: #16a34a; transform: scale(1.02); }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

    <div id="authScreen" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center p-4 text-center">
        <div class="glass-panel w-full max-w-lg p-8 border-2 border-green-600">
            <div class="mb-6"><i class="fas fa-crown text-5xl text-yellow-500"></i></div>
            <h2 class="text-2xl font-bold mb-8 text-green-500">منظومة الإدارة العليا - بحر الغُبُش</h2>
            <div class="grid grid-cols-2 gap-4 mb-8">
                <div onclick="selectUser('الشيخ عبداللطيف عبدالواحد')" class="cursor-pointer p-4 bg-zinc-900 rounded-xl border border-transparent hover:border-green-500">
                    <i class="fas fa-user-tie text-3xl mb-2 text-green-500"></i>
                    <p class="text-xs">المدير العام</p>
                </div>
                <div onclick="selectUser('الدكتور عبدالصمد عبدالواحد')" class="cursor-pointer p-4 bg-zinc-900 rounded-xl border border-transparent hover:border-blue-500">
                    <i class="fas fa-user-md text-3xl mb-2 text-blue-500"></i>
                    <p class="text-xs">نائب المدير</p>
                </div>
            </div>
            <div id="passInput" style="display:none;" class="animate-pulse">
                <input type="password" id="sysPassword" placeholder="كلمة المرور: flor19935" class="mb-4 py-3">
                <button onclick="access()" class="w-full btn-sync py-3 rounded-xl shadow-lg">تفعيل النظام</button>
            </div>
        </div>
    </div>

    <div id="adminLayout" style="display:none;">
        <header class="flex justify-between items-center mb-10 border-b border-green-900 pb-5">
            <div>
                <h1 class="text-2xl font-bold text-green-500">بحر الغُبُش | الإدارة</h1>
                <p id="adminTag" class="text-[10px] text-zinc-500 italic mt-1"></p>
            </div>
            <button onclick="location.reload()" class="text-red-500 border border-red-900 px-4 py-1 rounded text-xs hover:bg-red-950">خروج آمن</button>
        </header>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-10">
            <div class="stat-card">
                <p class="text-[10px] text-zinc-500">طلبات اليوم</p>
                <h4 class="text-xl font-bold text-green-500">24 طلبية</h4>
            </div>
            <div class="stat-card">
                <p class="text-[10px] text-zinc-500">الزوار حالياً</p>
                <h4 class="text-xl font-bold text-blue-500">12</h4>
            </div>
            <div class="stat-card">
                <p class="text-[10px] text-zinc-500">رصيد اليوم</p>
                <h4 class="text-xl font-bold text-yellow-500">1.2M <span class="text-[8px]">SDG</span></h4>
            </div>
            <div class="stat-card">
                <p class="text-[10px] text-zinc-500">إشعارات معلقة</p>
                <h4 class="text-xl font-bold text-red-500">7 تنبيهات</h4>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-8">
                <div class="glass-panel p-6 shadow-2xl">
                    <h3 class="text-green-500 font-bold mb-6 flex items-center border-r-4 border-green-600 pr-3">
                        <i class="fas fa-tags ml-2"></i> تحديث قائمة الأسعار (SDG)
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-black/40 p-3 rounded-lg">
                            <label class="text-[10px] block mb-2 text-zinc-400">سعر الرقية / السحر الأسود</label>
                            <input type="text" value="75,000">
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg">
                            <label class="text-[10px] block mb-2 text-zinc-400">القسط الهندي (مطحون)</label>
                            <input type="text" value="10,000">
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg">
                            <label class="text-[10px] block mb-2 text-zinc-400">زيت الزيتون المرقي (عبوة)</label>
                            <input type="text" value="20,000">
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg">
                            <label class="text-[10px] block mb-2 text-zinc-400">خلطة عسل "الشفاء"</label>
                            <input type="text" value="150,000">
                        </div>
                        <div class="bg-black/40 p-3 rounded-lg">
                            <label class="text-[10px] block mb-2 text-zinc-400">بخور الغُبُش</label>
                            <input type="text" value="50,000">
                        </div>
                    </div>
                    <button onclick="syncSite()" class="w-full btn-sync py-4 rounded-xl mt-8 text-lg">تحديث واجهة الزوار الآن</button>
                </div>
            </div>

            <div class="space-y-8">
                <div class="glass-panel p-6 border-cyan-900">
                    <h3 class="text-cyan-400 font-bold mb-4 text-sm italic">مراقبة الزوار (حقيقي)</h3>
                    <div class="text-center py-6 bg-black/50 rounded-2xl mb-4 border border-cyan-950">
                        <p class="text-5xl font-bold">12</p>
                        <p class="text-[8px] text-cyan-600 mt-2">زائر يتصفح الآن</p>
                    </div>
                    <button class="w-full bg-cyan-900 text-cyan-200 py-3 rounded-xl text-xs font-bold border border-cyan-700">الرد على محادثات الزوار</button>
                </div>

                <div class="glass-panel p-6 border-purple-900">
                    <h3 class="text-purple-400 font-bold mb-4 text-sm italic">المحتوى المرئي</h3>
                    <input type="text" placeholder="رابط فيديو اليوتيوب الجديد" class="mb-3">
                    <button class="w-full bg-purple-900 text-purple-200 py-2 rounded-lg text-[10px] border border-purple-700">تغيير فيديو الواجهة</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentAdmin = "";
        function selectUser(user) {
            currentAdmin = user;
            document.getElementById('passInput').style.display = 'block';
        }

        function access() {
            if(document.getElementById('sysPassword').value === 'flor19935') {
                document.getElementById('authScreen').style.display = 'none';
                document.getElementById('adminLayout').style.display = 'block';
                document.getElementById('adminTag').innerText = "المسؤول النشط: " + currentAdmin;
            } else { alert("عذراً، كلمة المرور غير صحيحة"); }
        }

        function syncSite() {
            // حل مشكلة رسالة التحديث للمدير العام
            alert("جاري إرسال التحديثات لـ " + currentAdmin + "... سيتم انعكاس الأسعار فوراً في موقع الزوار.");
        }
    </script>
</body>
</html>
