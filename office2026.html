<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بحر الغُبُش | غرفة المراقبة والتحكم</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap');
        body { font-family: 'Changa', sans-serif; background: #010a01; color: #fff; overflow-x: hidden; }
        .dashboard-grid { display: grid; grid-template-columns: 1fr 3fr 1fr; gap: 20px; }
        .panel { background: #051405; border: 1px solid #145a32; border-radius: 20px; padding: 20px; min-height: 600px; }
        .online-user { border-right: 3px solid #2ecc71; background: rgba(46, 204, 113, 0.1); padding: 10px; margin-bottom: 8px; border-radius: 5px; transition: all 0.3s; }
        .order-card { animation: slideIn 0.4s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="p-4 md:p-6">
    <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-green-500 italic leading-none">بَحْرُ الْغُبُشِ</h1>
            <span class="text-xs text-zinc-400 block mt-1">نظام الرادار الموحد - الإدارة المركزية</span>
        </div>
        <div class="bg-red-900/20 text-red-500 px-6 py-2 rounded-full border border-red-900 animate-pulse text-sm font-bold">
            <i class="fas fa-satellite-dish ml-2"></i> الرادار يراقب الآن
        </div>
    </header>

    <div class="dashboard-grid">
        <div class="panel">
            <h3 class="font-bold text-green-400 mb-4 border-b border-green-900 pb-2 flex justify-between">
                <span>المتواجدون الآن</span>
                <span id="count" class="bg-green-600 text-black px-2 rounded-full text-xs flex items-center">0</span>
            </h3>
            <div id="onlineList" class="space-y-2 text-sm overflow-y-auto max-h-[500px]">
                </div>
        </div>

        <div class="panel">
            <h3 class="font-bold text-blue-400 mb-4 border-b border-blue-900 pb-2 italic">
                <i class="fas fa-stream ml-2"></i> نبض الموقع الحي
            </h3>
            <div id="orderLog" class="h-[500px] overflow-y-auto space-y-3 pr-2 custom-scroll">
                <div id="emptyState" class="text-zinc-600 text-center mt-20 italic">
                    <i class="fas fa-ghost block text-4xl mb-4 opacity-20"></i>
                    لا يوجد نشاط حالي في الرادار...
                </div>
            </div>
        </div>

        <div class="panel">
            <h3 class="font-bold text-yellow-400 mb-4 border-b border-yellow-900 pb-2">بيانات اليوم</h3>
            <div class="space-y-4">
                <div class="text-center p-6 bg-black/50 rounded-xl border border-zinc-800">
                    <p class="text-xs text-zinc-500 mb-1">إجمالي العمليات</p>
                    <p id="totalOrders" class="text-4xl font-bold text-yellow-500">0</p>
                </div>
                
                <div class="p-4 bg-zinc-900/30 rounded-xl border border-zinc-800">
                    <p class="text-[10px] text-zinc-400 mb-2 underline">حالة الاتصال بالشبكة:</p>
                    <div class="flex items-center text-xs text-green-500">
                        <span class="relative flex h-2 w-2 ml-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                        </span>
                        مستعد لاستقبال البيانات
                    </div>
                </div>

                <button onclick="clearHistory()" class="w-full py-2 bg-red-950/20 text-[11px] text-red-400 hover:bg-red-900/40 border border-red-900/30 transition-all rounded-lg mt-10">
                    <i class="fas fa-trash-alt ml-1"></i> تصفير السجل المؤقت
                </button>
            </div>
        </div>
    </div>

    <script>
        // ربط القناة الموحدة
        const radar = new BroadcastChannel('bahr_network');
        const alertSound = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
        let totalCount = 0;
        let onlineUsers = new Set();

        // الاستماع للرسائل القادمة من المتجر أو الصفحات الأخرى
        radar.onmessage = (event) => {
            const data = event.data;
            
            if(data.type === 'VISITOR_ONLINE') {
                updateOnlineStatus(data.user || 'زائر مجهول');
            }
            
            if(data.type === 'CUSTOMER_ORDER') {
                processNewOrder(data);
            }
        };

        function updateOnlineStatus(name) {
            const list = document.getElementById('onlineList');
            const count = document.getElementById('count');
            
            // منع تكرار نفس الاسم في القائمة
            if (!onlineUsers.has(name)) {
                onlineUsers.add(name);
                const userDiv = document.createElement('div');
                userDiv.className = "online-user flex justify-between items-center";
                userDiv.innerHTML = `
                    <span><i class="fas fa-user-circle ml-2 text-green-700"></i> ${name}</span>
                    <span class="text-[9px] opacity-50">نشط الآن</span>
                `;
                list.prepend(userDiv);
                count.innerText = onlineUsers.size;
                addLog(`دخول مستخدم جديد: ${name}`, 'text-green-400');
            }
        }

        function processNewOrder(data) {
            // تشغيل التنبيه
            alertSound.play().catch(e => console.log("Sound error:", e));
            
            totalCount++;
            document.getElementById('totalOrders').innerText = totalCount;

            const log = document.getElementById('orderLog');
            const emptyState = document.getElementById('emptyState');
            if(emptyState) emptyState.remove();

            const entry = document.createElement('div');
            entry.className = "order-card bg-green-900/20 border border-green-800 p-4 rounded-xl flex justify-between items-center";
            entry.innerHTML = `
                <div>
                    <span class="text-green-400 font-bold text-sm block">
                        <i class="fas fa-shopping-cart ml-1"></i> طلب: ${data.service || 'منتج غير محدد'}
                    </span>
                    <p class="text-[11px] text-zinc-400 mt-1">بواسطة: ${data.user || 'عميل'}</p>
                </div>
                <div class="text-left">
                    <span class="text-[10px] bg-black px-2 py-1 rounded border border-zinc-700 block mb-1">
                        ${new Date().toLocaleTimeString('ar-EG')}
                    </span>
                    <span class="text-[9px] text-green-500 italic">تم الرصد بنجاح</span>
                </div>
            `;
            log.prepend(entry);
        }

        function addLog(msg, colorClass) {
            const log = document.getElementById('orderLog');
            const emptyState = document.getElementById('emptyState');
            if(emptyState) emptyState.remove();

            const p = document.createElement('div');
            p.className = `text-[11px] border-b border-zinc-900 py-2 ${colorClass} opacity-80`;
            p.innerHTML = `<i class="fas fa-bolt ml-2 text-[8px]"></i> [${new Date().toLocaleTimeString('ar-EG')}] - ${msg}`;
            log.prepend(p);
        }

        function clearHistory() {
            if(confirm('هل تريد فعلاً مسح سجل المراقبة الحالي؟')) {
                document.getElementById('orderLog').innerHTML = '<div id="emptyState" class="text-zinc-600 text-center mt-20 italic">تم تصفير السجل...</div>';
                document.getElementById('onlineList').innerHTML = '';
                document.getElementById('count').innerText = '0';
                document.getElementById('totalOrders').innerText = '0';
                totalCount = 0;
                onlineUsers.clear();
            }
        }
    </script>
</body>
</html>
