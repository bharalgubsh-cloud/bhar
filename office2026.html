<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منظومة الإدارة المركزية | بحر الغُبُش</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@400;700&display=swap');
        body { font-family: 'Changa', sans-serif; background: #010a01; color: #f0f0f0; }
        .admin-glass { background: rgba(10, 35, 10, 0.95); border: 1px solid #145a32; border-radius: 20px; box-shadow: 0 0 20px rgba(0,255,0,0.05); }
        .btn-update { background: linear-gradient(90deg, #166534, #15803d); transition: 0.3s; }
        .btn-update:hover { transform: scale(1.02); box-shadow: 0 0 15px rgba(34,197,94,0.3); }
        input, select { background: #000 !important; border: 1px solid #1b4332 !important; color: #2ecc71 !important; border-radius: 8px; padding: 8px; width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div id="lockScreen" class="fixed inset-0 bg-black z-[9999] flex items-center justify-center p-4">
        <div class="admin-glass w-full max-w-xl p-8 text-center">
            <h2 class="text-2xl font-bold mb-8 text-green-500 italic">بوابة الإدارة العليا - مركز بحر الغُبُش</h2>
            <div class="grid grid-cols-2 gap-6 mb-8">
                <div onclick="setAuth('الشيخ عبداللطيف عبدالواحد')" class="cursor-pointer p-4 rounded-xl bg-black/40 border border-green-900 hover:border-green-500 transition">
                    <img src="https://ui-avatars.com/api/?name=A+L&background=065f46&color=fff" class="w-16 h-16 mx-auto rounded-full mb-2">
                    <p class="text-sm">الشيخ عبداللطيف</p>
                </div>
                <div onclick="setAuth('الدكتور عبدالصمد عبدالواحد')" class="cursor-pointer p-4 rounded-xl bg-black/40 border border-blue-900 hover:border-blue-500 transition">
                    <img src="https://ui-avatars.com/api/?name=A+S&background=1e3a8a&color=fff" class="w-16 h-16 mx-auto rounded-full mb-2">
                    <p class="text-sm">د. عبدالصمد</p>
                </div>
            </div>
            <div id="authBox" style="display:none;" class="animate-pulse">
                <input type="password" id="passCode" placeholder="كلمة المرور: flor19935" class="mb-4">
                <button onclick="login()" class="w-full bg-green-600 text-black py-2 rounded-lg font-bold">تفعيل لوحة التحكم</button>
            </div>
        </div>
    </div>

    <div id="mainBoard" style="display:none;" class="p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 border-b border-green-900 pb-4">
            <div>
                <h1 class="text-xl font-bold">إدارة الموقع العام <i class="fas fa-sync-alt text-green-500 mr-2 text-xs"></i></h1>
                <p id="userName" class="text-[10px] text-zinc-500"></p>
            </div>
            <button onclick="location.reload()" class="text-red-500 text-xs border border-red-900 px-3 py-1 rounded">خروج</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            
            <div class="admin-glass p-6">
                <h3 class="text-green-500 font-bold mb-6 flex items-center border-r-4 border-green-600 pr-3">
                    <i class="fas fa-shopping-cart ml-2"></i> التحكم في أسعار الخدمات المعروضة
                </h3>
                <div class="space-y-4">
                    <div class="flex items-center gap-4 bg-black/30 p-2 rounded">
                        <span class="text-xs w-32">الرقية الشرعية</span>
                        <input type="text" id="price1" value="75,000">
                    </div>
                    <div class="flex items-center gap-4 bg-black/30 p-2 rounded">
                        <span class="text-xs w-32">الأعشاب والحجامة</span>
                        <input type="text" id="price2" value="30,000">
                    </div>
                    <div class="flex items-center gap-4 bg-black/30 p-2 rounded">
                        <span class="text-xs w-32">الزيوت الفاخرة</span>
                        <input type="text" id="price3" value="15,000">
                    </div>
                    <div class="flex items-center gap-4 bg-black/30 p-2 rounded">
                        <span class="text-xs w-32">بخور الغُبُش</span>
                        <input type="text" id="price4" value="25,000">
                    </div>
                    <div class="flex items-center gap-4 bg-black/30 p-2 rounded">
                        <span class="text-xs w-32">جلسة استشارة</span>
                        <input type="text" id="price5" value="50,000">
                    </div>
                    <button onclick="updateSite()" class="w-full btn-update py-3 rounded-xl font-bold mt-4">تحديث الموقع العام الآن</button>
                </div>
            </div>

            <div class="space-y-6">
                <div class="admin-glass p-6 border-purple-900/40">
                    <h3 class="text-purple-400 font-bold mb-4 text-xs"><i class="fas fa-video ml-2"></i> إضافة فيديو للموقع</h3>
                    <input type="text" placeholder="عنوان الفيديو الجديد" class="mb-3">
                    <input type="text" placeholder="رابط يوتيوب (مثلاً: https://youtu.be/...)" class="mb-3">
                    <button class="w-full bg-purple-900/40 text-purple-400 py-2 rounded-lg text-xs font-bold border border-purple-800">نشر الفيديو في واجهة الزوار</button>
                </div>

                <div class="admin-glass p-6 border-cyan-900/40">
                    <h3 class="text-cyan-400 font-bold mb-4 text-xs">حالة الزوار (أونلاين)</h3>
                    <div class="flex justify-around items-center">
                        <div class="text-center">
                            <p class="text-2xl font-bold">12</p>
                            <p class="text-[8px] text-zinc-500 uppercase tracking-widest">يشاهدون الآن</p>
                        </div>
                        <div class="w-px h-10 bg-cyan-900"></div>
                        <div class="text-center">
                            <p class="text-2xl font-bold text-green-500">482</p>
                            <p class="text-[8px] text-zinc-500 uppercase tracking-widest">إجمالي اليوم</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        let selectedUser = "";
        function setAuth(name) {
            selectedUser = name;
            document.getElementById('authBox').style.display = 'block';
        }

        function login() {
            if(document.getElementById('passCode').value === 'flor19935') {
                document.getElementById('lockScreen').style.display = 'none';
                document.getElementById('mainBoard').style.display = 'block';
                document.getElementById('userName').innerText = "المسؤول الحالي: " + selectedUser;
            } else { alert('كلمة المرور خاطئة'); }
        }

        function updateSite() {
            alert('جاري مزامنة الأسعار الجديدة مع الموقع العام لزوار مركز بحر الغُبُش...');
            // هنا يتم الربط البرمجي الفعلي مستقبلاً
        }
    </script>
</body>
</html>
