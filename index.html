<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بَحْرُ الْغُبُشِ | لِلرُّقْيَةِ الشَّرْعِيَّةِ وَالْعِلَاجِ الطَّبِيعِيِّ</title>
    
    <meta name="description" content="موقع بحر الغبش الرسمي - إدارة الشيخ عبداللطيف والدكتور عبدالصمد. متخصصون في الرقية الشرعية والزيوت الطبيعية والأعشاب.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Changa:wght@300;500;700&display=swap');
        body { font-family: 'Changa', sans-serif; background-color: #010f01; color: #e5e5e5; scroll-behavior: smooth; }
        .green-glow-text { background: linear-gradient(to right, #2ecc71, #f1c40f, #27ae60); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: bold; }
        .glass-card { background: rgba(5, 30, 5, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(46, 204, 113, 0.3); border-radius: 15px; }
        .btn-green { background: linear-gradient(135deg, #27ae60, #2ecc71); color: white; font-weight: bold; border-radius: 10px; cursor: pointer; transition: 0.3s; }
        .admin-panel { display: none; position: fixed; inset: 0; background: #010a01; z-index: 9999; overflow-y: auto; padding: 20px; }
        input, select { background: #051a05 !important; border: 1px solid #145a32 !important; color: white !important; padding: 10px !important; border-radius: 8px !important; width: 100%; margin-bottom: 12px; }
    </style>
</head>
<body>

    <div id="mainUI" class="max-w-6xl mx-auto px-4 py-10">
        <header class="text-center mb-16">
            <h1 class="text-5xl md:text-7xl green-glow-text font-bold mb-4">بَحْرُ الْغُبُشِ <i class="fas fa-anchor"></i></h1>
            <p class="text-green-500 font-bold tracking-widest">مَرْحَباً بِكُمْ فِي مَنْظُومَةِ الْعِلَاجِ</p>
        </header>

        <div id="tabs" class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12 text-center">
            </div>

        <div id="contentDisplay" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>

        <footer class="mt-32 pt-10 border-t border-green-900/40 text-center">
            <button onclick="document.getElementById('adminArea').style.display='block'" class="text-zinc-600 text-[10px] hover:text-green-500 transition">🔐 مَرْكَزُ الْقِيَادَةِ</button>
        </footer>
    </div>

    <div id="adminArea" class="admin-panel">
        <div class="max-w-5xl mx-auto">
            <div class="flex justify-between items-center mb-10 border-b border-green-900 pb-4">
                <h2 class="green-glow-text text-3xl font-bold underline">إِدَارَةُ مَنْظُومَةِ بَحْرِ الْغُبُشِ</h2>
                <button onclick="document.getElementById('adminArea').style.display='none'" class="text-red-500 font-bold">إِغْلَاقٌ [X]</button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
                <div class="glass-card p-6">
                    <h3 class="font-bold text-white mb-6 border-b border-green-800 pb-2"><i class="fas fa-user-edit"></i> تَعْدِيلُ الْبُرُوفَايْل</h3>
                    <select id="sID" onchange="syncStaff()">
                        <option value="0">الشيخ عبداللطيف (المدير)</option>
                        <option value="1">دكتور عبدالصمد (النائب)</option>
                    </select>
                    <input type="text" id="pImg" placeholder="رَابِطُ الصُّورَةِ">
                    <input type="text" id="pName" placeholder="الِاسْمُ الْكَامِلُ">
                    <input type="text" id="pBio" placeholder="الْمُؤَهِّلُ الْعِلْمِيُّ">
                    <input type="password" id="pPass" placeholder="كَلِمَةُ الْمُرُورِ">
                    <button onclick="updateP()" class="w-full btn-green py-3 mt-2">حِفْظُ التَّعْدِيلِ</button>
                </div>

                <div class="glass-card p-6">
                    <h3 class="font-bold text-white mb-6 border-b border-green-800 pb-2"><i class="fas fa-folder-plus"></i> إِضَافَةُ أَقْسَامٍ وَأَصْنَافٍ يَدَوِيّاً</h3>
                    <input type="text" id="catName" placeholder="اسْمُ الْقِسْمِ الْجَدِيدِ (مَثَلاً: قِسْمُ الْبَخُورِ)">
                    <button onclick="newCat()" class="w-full btn-green py-2 bg-yellow-700 mb-6">إِنْشَاءُ الْقِسْمِ</button>
                    <hr class="border-green-900 mb-6">
                    <select id="catList"></select>
                    <input type="text" id="itemName" placeholder="اسْمُ الْمُنْتَجِ">
                    <input type="number" id="itemPrice" placeholder="السِّعْرُ (SDG)">
                    <button onclick="newItem()" class="w-full btn-green py-3">إِضَافَةُ الصِّنْفِ لِلْمَوْقِعِ</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // قَاعِدَةُ الْبَيَانَاتِ الْكَامِلَةِ (بِدُونِ حَذْفٍ)
        let db = {
            cats: {
                "roqya": { t: "الرُّقْيَةُ (18)", i: "fa-scroll", items: [
                    {n: "العين والحسد", p: 0}, {n: "السحر المرشوش", p: 0}, {n: "المس الشيطاني", p: 0}, {n: "الريح الأحمر", p: 0}
                ]},
                "oils": { t: "الزُّيُوتُ", i: "fa-flask", items: [
                    {n: "زيت الزيتون المرقي", p: 15000}, {n: "زيت الحبة السوداء", p: 12000}, {n: "زيت السمسم", p: 5500}, {n: "زيت الخروع", p: 7000}
                ]},
                "herbs": { t: "الْأَعْشَابُ", i: "fa-leaf", items: [
                    {n: "القسط الهندي", p: 7500}, {n: "سنا مكي", p: 4000}, {n: "لبان ذكر", p: 8000}
                ]},
                "honey": { t: "الْعَسَلُ", i: "fa-fill-drip", items: [
                    {n: "عسل نحل أصلي", p: 15000}, {n: "عسل مرقي خاص", p: 50000}
                ]}
            },
            staff: [
                {name: "الشيخ عبداللطيف", bio: "خبير الرقية الشرعية", pass: "aboooha778899", img: ""},
                {name: "دكتور عبدالصمد", bio: "باحث في الطب البديل", pass: "flor19935", img: ""}
            ]
        };

        function render() {
            const t = document.getElementById('tabs'); t.innerHTML = "";
            const cl = document.getElementById('catList'); cl.innerHTML = "";
            for(let k in db.cats) {
                t.innerHTML += `<div onclick="show('${k}')" class="glass-card p-6 cursor-pointer hover:border-green-400">
                    <i class="fas ${db.cats[k].i} text-green-500 text-2xl mb-2"></i><br><b>${db.cats[k].t}</b></div>`;
                cl.innerHTML += `<option value="${k}">${db.cats[k].t}</option>`;
            }
        }

        function show(k) {
            const d = document.getElementById('contentDisplay'); d.innerHTML = "";
            db.cats[k].items.forEach(it => {
                d.innerHTML += `<div class="glass-card p-6 text-center">
                    <h3 class="text-xl font-bold mb-2">${it.n}</h3>
                    <p class="green-glow-text text-xl mb-4">${it.p > 0 ? it.p.toLocaleString()+' SDG' : 'خِدْمَةٌ مَجَّانِيَّةٌ'}</p>
                    <button class="w-full btn-green py-2 text-xs">اُطْلُبِ الْآنَ</button>
                </div>`;
            });
        }

        function syncStaff() {
            const s = db.staff[document.getElementById('sID').value];
            document.getElementById('pName').value = s.name;
            document.getElementById('pBio').value = s.bio;
            document.getElementById('pPass').value = s.pass;
            document.getElementById('pImg').value = s.img;
        }

        function updateP() {
            const i = document.getElementById('sID').value;
            db.staff[i].name = document.getElementById('pName').value;
            db.staff[i].bio = document.getElementById('pBio').value;
            db.staff[i].pass = document.getElementById('pPass').value;
            db.staff[i].img = document.getElementById('pImg').value;
            alert("تَمَّ حِفْظُ بَيَانَاتِ الْبُرُوفَايْل يَدَوِيّاً ✅");
        }

        function newCat() {
            const n = document.getElementById('catName').value; if(!n) return;
            db.cats["c_"+Date.now()] = { t: n, i: "fa-box-open", items: [] };
            render(); alert("تَمَّ إِنْشَاءُ الْقِسْمِ ✅");
        }

        function newItem() {
            const c = document.getElementById('catList').value;
            const n = document.getElementById('itemName').value;
            const p = document.getElementById('itemPrice').value;
            if(!n) return;
            db.cats[c].items.push({n: n, p: parseInt(p) || 0});
            show(c); alert("تَمَّتِ الْإِضَافَةُ ✅");
        }

        window.onload = () => { render(); show('roqya'); };
    </script>
</body>
</html>
